project:
  type: website
  output-dir: docs
  render:
    - index.qmd
    - notes/index.qmd
    - slides/index.qmd

website:
  title: "Introduction to Physical AI"
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: notes/index.qmd
        text: Lecture Notes
      - href: slides/index.qmd
        text: Slides
  page-footer:
    left: "Introduction to Physical AI"
    right: "Built with [Quarto](https://quarto.org)"

format:
  html:
    theme:
      light:
        - cosmo
        - styles/course-website.scss
    toc: true
    toc-depth: 3
    smooth-scroll: true
    code-copy: true
    anchor-sections: true

execute:
  freeze: auto
